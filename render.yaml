services:
  - type: web
    name: portal-predio
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: GCP_CREDENTIALS_JSON
        sync: false
      - key: N8N_ASSISTANT_WEBHOOK_URL
        sync: false
